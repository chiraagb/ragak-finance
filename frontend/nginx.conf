server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Disable buffering for SSE
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
