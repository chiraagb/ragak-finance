services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragak
      POSTGRES_USER: ragak_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragak_user -d ragak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      DATABASE_URL_SYNC: postgresql+psycopg2://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python -m db.seed &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      DATABASE_URL_SYNC: postgresql+psycopg2://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOAD_DIR: /app/uploads
      PYTHONPATH: /app
    command: celery -A processing.worker worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      DATABASE_URL_SYNC: postgresql+psycopg2://ragak_user:${POSTGRES_PASSWORD}@postgres:5432/ragak
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOAD_DIR: /app/uploads
      PYTHONPATH: /app
    command: celery -A processing.worker beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads:
